name: Maven Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn install -DskipTests -Pdeploy -pl atic-server -am

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: atic-server/target/atic.jar
