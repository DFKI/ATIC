<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">

        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <link href="css/all.min.css" rel="stylesheet" />
        <!-- link href="css/jquery-ui.css" rel="stylesheet" / -->
        <link href="css/loader.css" rel="stylesheet" />
        <link href="css/link.css" rel="stylesheet" />

        <!-- script src="js/jquery.min.js"></script>
        <script src="js/jquery-ui.min.js"></script-->
        <script src="js/bootstrap.bundle.min.js" ></script>
        <script src="js/vue.global.prod.js" ></script>
        <script src="js/axios.min.js"></script>

        <link rel="shortcut icon" href="favicon.ico">
        <title>Login | {{instanceName}}</title>
    </head>
    <body>
        <div class="container text-center" id="app">

            <div class="row d-flex justify-content-center">

                <div class="col-lg-6">
                    <h1 class="m-4">
                        <img src="img/atic-server.png" style="height: 60px"><br/>
                        {{instanceName}}
                    </h1>

                    <form @submit.prevent="login">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Username"
                                v-model="username"
                                required
                                @keyup.enter="login()"
                                />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input
                                type="password"
                                class="form-control"
                                placeholder="Password"
                                v-model="password"
                                required
                                @keyup.enter="login()"
                                />
                        </div>
                        <br/>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Login
                            </button>
                        </div>
                    </form>
                </div>

                <div v-if="error_msg" class="text-danger text-center mt-3">
                    {{ error_msg }}
                </div>
            </div>
        </div>

        <div class="row">
            <div style="background: white; font-size: 12px;" class="fixed-bottom">
                &nbsp;

                &copy; 2026 <a href="https://www.dfki.de/" target="_blank"><img src="img/dfki_Logo_digital_black.png" style="height: 12px;"></a>
            </div>
        </div>


        <script>
        //axios settings
        let basePath = window.location.pathname;
        if (basePath.endsWith('/')) {
            basePath = basePath.slice(0, -1);
        }
        // remove last segment if it ends with .html
        basePath = basePath.replace(/\/[^/]+\.html$/, '');
        if (basePath === '') {
            basePath = '/';
        }
        axios.defaults.baseURL = basePath;
        console.log("axios baseURL is " + basePath);

        const {createApp} = Vue;

        createApp({
            data() {
                return {
                    loading: false,
                    username: "",
                    password: "",
                    error_msg: ""
                };
            },
            created() {

            },
            methods: {
                login() {
                    this.loading = true;
                    this.error_msg = "";

                    const formData = new FormData();
                    formData.append('grant_type', 'password');
                    formData.append('username', this.username);
                    formData.append('password', this.password);

                    axios.post('../auth/token', formData)
                            .then(response => {
                                this.loading = false;

                                //we use the cookie
                                //const accessToken = response.data.access_token;
                                //sessionStorage.setItem('access_token', accessToken);

                                if (response.data.successful) {
                                    window.location.href = response.data.redirect;
                                } else {
                                    this.error_msg = response.data.msg;
                                }
                            }).catch(() => {
                        this.loading = false;
                        this.error_msg = 'Login failed';
                    });
                }
            }
        }).mount('#app');
        </script>
    </body>
</html>
