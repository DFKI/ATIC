<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">

        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <link href="css/all.min.css" rel="stylesheet" />
        <link href="css/loader.css" rel="stylesheet" />
        <link href="css/link.css" rel="stylesheet" />

        <script src="js/bootstrap.bundle.min.js" ></script>
        <script src="js/vue.global.prod.js" ></script>
        <script src="js/axios.min.js"></script>

        <link rel="shortcut icon" href="favicon.ico">
        <title>Upload Demo | Atic</title>
    </head>
    <body>
        <div class="container mt-4" id="app">

            <div class="row align-items-center">
                <div class="col d-flex align-items-center m-2">
                    <h3 class="mb-0 d-flex align-items-center me-2">
                        Upload Demo
                    </h3>
                    <div v-if="loading" class="spinner-border text-primary" role="status" style="width: 1.5rem; height: 1.5rem;"
                         @click="loading = false">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <div class="col-auto ms-auto me-2" v-if="user">
                    <span class="me-2" :title="user.username">
                        <i class="fa fa-user"></i> {{ user.firstname }} {{ user.lastname }}
                    </span>
                    <button class="btn btn-sm btn-danger" @click="postLogout()" title="Logout"><i class="fa fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- --- Upload Form --- -->
            <div class="card my-4 p-3">
                <h5>Upload RDF Files</h5>

                <!-- file selection -->
                <div class="mb-3">
                    <label class="form-label">Select Files</label>
                    <input
                        type="file"
                        multiple
                        @change="onFileChange"
                        class="form-control"
                        />
                </div>

                <!-- custom graph toggle -->
                <div class="form-check mb-3">
                    <input
                        type="checkbox"
                        id="customGraphCheck"
                        v-model="useCustomGraph"
                        class="form-check-input"
                        />
                    <label class="form-check-label" for="customGraphCheck">Use Custom Graph</label>
                </div>

                <!-- graph URI input when toggle on -->
                <div v-if="useCustomGraph" class="mb-3">
                    <input
                        type="text"
                        v-model="customGraphUri"
                        placeholder="Enter Graph URI"
                        class="form-control"
                        />
                </div>

                <!-- sharing toggle -->
                <div class="form-check mb-3">
                    <input
                        type="checkbox"
                        id="sharingCheck"
                        v-model="useSharing"
                        class="form-check-input"
                        />
                    <label class="form-check-label" for="sharingCheck">Enable Sharing</label>
                </div>

                <!-- share config fields when toggle on -->
                <div v-if="useSharing">
                    <div class="mb-3">
                        <label class="form-label">Add a name or group</label>
                        <input type="text"
                               class="form-control"
                               v-model="shareSearchQuery"
                               @input="searchPrincipal"
                               placeholder="Add a name or group">
                    </div>

                    <!-- principal search results -->
                    <ul class="list-group mb-3" v-if="principalSearchResults">
                        <li class="list-group-item"
                            v-for="principal in principalSearchResults.principals"
                            :key="principal.id"
                            style="cursor: pointer"
                            @click="addSharePrincipal(principal)">

                            <i v-if="principal.type === 'user'" class="fa fa-user me-2"></i>
                            <i v-else-if="principal.type === 'group'" class="fa fa-users me-2"></i>
                            {{ principal.label }}
                        </li>
                    </ul>

                    <!-- selected principals/tags -->
                    <div class="mb-3">
                        <span class="badge bg-secondary me-1"
                              v-for="(p, idx) in sharePrincipals"
                              :key="idx">
                            <i v-if="p.type === 'user'" class="fa fa-user me-2"></i>
                            <i v-else-if="p.type === 'group'" class="fa fa-users me-2"></i>
                            {{ p.label }}
                            <button type="button"
                                    class="btn-close btn-close-white btn-sm"
                                    @click="removeSharePrincipal(idx)"></button>
                        </span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Permission</label>
                        <select class="form-select"
                                v-model="permission">
                            <option value="READ">Can view</option>
                            <option value="REFER">Can refer to</option>
                            <option value="EDIT">Can edit</option>
                            <option value="ADMIN">Can administer (and delete)</option>
                        </select>
                    </div>
                </div>

                <!-- upload button -->
                <button class="btn btn-primary" @click="submitUpload">
                    Upload
                </button>

                <div class="alert alert-success alert-dismissible fade show m-4"
                     role="alert"
                     v-if="uploadSuccess">

                    <i class="fa fa-check-circle me-2"></i>
                    Upload was successful.

                    <button type="button"
                            class="btn-close"
                            @click="uploadSuccess = false">
                    </button>
                </div>
            </div>

            <div class="modal" id="errorModal" tabindex="-1" ref="error_modal">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5">Error</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="alert alert-danger" role="alert">
                                <span style="white-space: pre-wrap; word-break: break-word;">
                                    {{ error }}
                                </span>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div style="background: white; font-size: 12px;" class="fixed-bottom">
                &nbsp;
                &copy; 2026 <a href="https://www.dfki.de/" target="_blank"><img src="img/dfki_Logo_digital_black.png" style="height: 12px;"></a>
            </div>
        </div>

        <script>
const {createApp} = Vue;

createApp({
    data() {
        return {
            loading: false,
            error: null,
            user: null,

            // upload form state
            files: [],
            useCustomGraph: false,
            customGraphUri: "",
            useSharing: false,
            groupInput: "",
            permission: "READ",
            uploadSuccess: false,

            shareSearchQuery: "",
            principalSearchResults: [],
            sharePrincipals: [],
        };
    },
    created() {
        axios.interceptors.response.use(
                response => response,
                error => {
                    const errorMsg = error.response?.data || error.message || "Unknown error";
                    this.open_error_modal(errorMsg);
                    return Promise.reject(error);
                }
        );
        this.getAuthMe();
    },
    methods: {

        searchPrincipal() {
            if (!this.shareSearchQuery) {
                this.principalSearchResults = null;
                return;
            }
            axios.get("/principal", {
                params: {query: this.shareSearchQuery}
            }).then(resp => {
                this.principalSearchResults = resp.data;
            });
        },

        addSharePrincipal(principal) {
            // only add if not already in list
            if (!this.sharePrincipals.find(u => u.id === principal.id)) {
                this.sharePrincipals.push(principal);
            }
            this.principalSearchResults = null;
            this.shareSearchQuery = "";
        },

        removeSharePrincipal(index) {
            this.sharePrincipals.splice(index, 1);
        },

        getAuthMe() {
            axios.get('/auth/me').then(response => {
                this.user = response.data;
            });
        },
        postLogout() {
            axios.post('/auth/logout').then(response => {
                window.location.href = response.data.redirect;
            });
        },

        onFileChange(e) {
            // save all selected files
            this.files = Array.from(e.target.files);
        },

        async submitUpload() {
            this.uploadSuccess = false;

            if (!this.files.length) {
                this.open_error_modal("No files selected!");
                return;
            }

            const formData = new FormData();

            // append multiple files
            this.files.forEach(file => {
                formData.append("file", file);
            });

            // optionally append graph uri
            if (this.useCustomGraph && this.customGraphUri.trim() !== "") {
                formData.append("graph", this.customGraphUri.trim());
            }

            // optionally append groups + permission
            if (this.useSharing) {
                this.sharePrincipals.forEach(p => {
                    formData.append("group", p.shareUri);
                });
                formData.append("permission", this.permission);
            }

            try {
                this.loading = true;
                const response = await axios.post('/upload', formData, {
                    headers: {
                        'Content-Type': 'multipart/form-data'
                    }
                });

                //alert("Upload success!");
                this.loading = false;
                this.uploadSuccess = true;
            } catch (err) {
                this.loading = false;
                // axios interceptor will show error modal
            }
        },

        open_error_modal(msg) {
            this.error = msg;
            this.loading = false;
            const modalInstance = new window.bootstrap.Modal(this.$refs.error_modal);
            modalInstance.show();
        },
    }
}).mount("#app");
        </script>
    </body>
</html>
